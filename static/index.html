<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Video Tutorial Task Manager</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <!-- Sidebar -->
    <div class="sidebar">
        <div class="p-4">
            <h4 class="text-center">
                <i class="fas fa-video"></i> Task Manager
            </h4>
            <nav class="nav flex-column mt-4">
                <a class="nav-link active" href="#" onclick="showPage('tasks')">
                    <i class="fas fa-tasks"></i> Tasks
                </a>
                <a class="nav-link" href="#" onclick="showPage('stages')">
                    <i class="fas fa-layer-group"></i> Task Stages
                </a>
                <a class="nav-link" href="#" onclick="showPage('reports')">
                    <i class="fas fa-chart-line"></i> Reports
                </a>
                <a class="nav-link" href="#" onclick="showPage('reminders')">
                    <i class="fas fa-bell"></i> Reminder Logs
                </a>
            </nav>
        </div>
    </div>

    <!-- Main Content -->
    <div class="content-area">
        <div id="alertContainer"></div>
        
        <!-- Tasks Page -->
        <div id="tasksPage" style="display: block;">
            <div class="row">
                <div class="col-md-12">
                    <div class="card">
                        <div class="card-header">
                            <h5><i class="fas fa-plus-circle"></i> Task Management</h5>
                        </div>
                        <div class="card-body">
                            <div class="row">
                                <div class="col-md-4">
                                    <form id="taskForm">
                                        <input type="hidden" id="taskId">
                                        <div class="mb-3">
                                            <label class="form-label">Lesson ID</label>
                                            <input type="text" id="lessonId" class="form-control" required>
                                        </div>
                                        <div class="mb-3">
                                            <label class="form-label">Assigned To (User ID)</label>
                                            <input type="number" id="assignedTo" class="form-control" required>
                                        </div>
                                        <div class="mb-3">
                                            <label class="form-label">Start Date</label>
                                            <input type="date" id="startDate" class="form-control" required>
                                        </div>
                                        <div class="mb-3">
                                            <label class="form-label">Due Date</label>
                                            <input type="date" id="dueDate" class="form-control" required>
                                        </div>
                                        <div class="mb-3">
                                            <label class="form-label">Status</label>
                                            <select id="status" class="form-select">
                                                <option value="Pending">Pending</option>
                                                <option value="Completed">Completed</option>
                                            </select>
                                        </div>
                                        <button type="submit" class="btn btn-primary">
                                            <i class="fas fa-save"></i> Add Task
                                        </button>
                                        <button type="button" class="btn btn-secondary" onclick="clearTaskForm()">
                                            <i class="fas fa-eraser"></i> Clear
                                        </button>
                                    </form>
                                </div>
                                <div class="col-md-8">
                                    <div class="search-box">
                                        <i class="fas fa-search"></i>
                                        <input type="text" id="searchTask" class="form-control" placeholder="Search by Lesson ID...">
                                    </div>
                                    <div class="table-responsive">
                                        <div id="tasksList">Loading...</div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Stages Page -->
        <div id="stagesPage" style="display: none;">
            <div class="card">
                <div class="card-header">
                    <h5><i class="fas fa-layer-group"></i> Task Stage Management</h5>
                </div>
                <div class="card-body">
                    <div class="row">
                        <div class="col-md-4">
                            <label class="form-label">Task ID</label>
                            <input type="number" id="stageTaskId" class="form-control" placeholder="Enter Task ID">
                            <button class="btn btn-primary mt-3" onclick="loadTaskStages()">
                                <i class="fas fa-download"></i> Load Stages
                            </button>
                        </div>
                        <div class="col-md-8">
                            <div id="stagesList" class="mt-3">Select a task to view stages</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Reports Page -->
      <!-- Reports Page -->
<div id="reportsPage" style="display: none;">
    <div class="card">
        <div class="card-header d-flex justify-content-between align-items-center">
            <h5 class="mb-0"><i class="fas fa-chart-bar"></i> Task-Stage Report</h5>
            <button class="btn btn-info btn-sm" onclick="loadReport()">
                <i class="fas fa-refresh"></i> Refresh Report
            </button>
        </div>
        <div class="card-body">
            <div class="table-responsive">
                <div id="reportList">Loading...</div>
            </div>
        </div>
    </div>
</div>

        <!-- Reminder Logs Page -->
<div id="remindersPage" style="display: none;">
    <div class="card">
        <div class="card-header d-flex justify-content-between align-items-center">
            <h5 class="mb-0"><i class="fas fa-history"></i> Reminder Logs</h5>
            <button class="btn btn-info btn-sm" onclick="loadReminderLogs()">
                <i class="fas fa-refresh"></i> Refresh Logs
            </button>
        </div>
        <div class="card-body">
            <div class="table-responsive">
                <div id="remindersList">Loading...</div>
            </div>
        </div>
    </div>
</div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/static/js/app.js"></script>
</body>
</html>
